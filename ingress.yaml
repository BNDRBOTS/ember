apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ember-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - ember.example.com
    secretName: ember-tls
  rules:
  - host: ember.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ember-api
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ember-web
            port:
              number: 3000
