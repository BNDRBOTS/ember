apiVersion: apps/v1
kind: Deployment
metadata:
  name: ember-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ember-api
  template:
    metadata:
      labels:
        app: ember-api
    spec:
      containers:
      - name: api
        image: ghcr.io/yourorg/ember-api:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: ember-config
---
apiVersion: v1
kind: Service
metadata:
  name: ember-api
spec:
  selector:
    app: ember-api
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ember-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
