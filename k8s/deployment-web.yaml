apiVersion: apps/v1
kind: Deployment
metadata:
  name: ember-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ember-web
  template:
    metadata:
      labels:
        app: ember-web
    spec:
      containers:
      - name: web
        image: ghcr.io/yourorg/ember-web:latest
        ports:
        - containerPort: 3000
        env:
        - name: API_GATEWAY_URL
          value: "http://ember-api:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: ember-web
spec:
  selector:
    app: ember-web
  ports:
  - port: 3000
    targetPort: 3000
